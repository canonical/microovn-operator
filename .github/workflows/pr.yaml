name: Pull Request

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '12 6 * * 1'
  workflow_dispatch:

jobs:
  inclusive-naming:
    name: Inclusive naming
    uses: canonical/Inclusive-naming/.github/workflows/woke.yaml@main
    with:
      fail-on-error: "false"

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  code-checks:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y tox
      - name: Check Code
        run: make check-code

  alert-test:
    name: Test Prometheus Alert Rules
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install prometheus snap
        run: sudo snap install prometheus
      - name: Check validity of prometheus alert rules
        run: promtool check rules src/prometheus_alert_rules/*
      - name: Run unit tests for prometheus alert rules
        run: promtool test rules tests/alerts/*.yaml

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y tox
      - name: Run Unit Tests
        run: make check-unit
      - name: Generate Cobertura XML
        run: |
          mkdir -p coverage-results
          tox exec -e unit -- coverage xml -o coverage-results/cobertura.xml
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: coverage-results/cobertura.xml
          retention-days: 1

  pack-microovn:
    name: Pack MicroOVN charm
    uses: ./.github/workflows/_build_charm.yaml
    with:
      path-to-charm-directory: .

  pack-interface-consumer:
    name: Pack interface consumer charm
    uses: ./.github/workflows/_build_charm.yaml
    with:
      path-to-charm-directory: tests/interface-consumer
      pre-pack-hook: make charm-libs

  setup:
    name: Setup tests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y tox jq
      - name: Discover individual tests
        id: discover
        run: |
          # The tox environment configuration installs dependencies with poetry
          # in commands_pre.
          #
          # Consequently we cannot simply use the `--notest` argument to get
          # the virtual environment populated with dependencies.
          #
          # The integration environment conveniently passes arguments to
          # pytest, and we can use its `--version` argument as a noop which
          # achieves the same thing.
          tox -e integration -- --version
          tests=$(.tox/integration/bin/pytest -q --collect-only tests/integration/ | grep ::test_ | jq -R -s -c 'split("\n")[:-1]')
          echo $tests
          echo "matrix={\"test\":$tests}" >> $GITHUB_OUTPUT

  test:
    name: Run integration tests
    runs-on: ubuntu-latest
    needs:
      - pack-microovn
      - pack-interface-consumer
      - setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: ./charms

      - name: Set charm paths
        run: |
          # Find each charm file by its expected prefix
          MICROOVN_CHARM_PATH=$(find ./charms -type f -name 'microovn_*.charm' -print -quit)
          INTERFACE_CONSUMER_CHARM_PATH=$(find ./charms -type f -name 'interface-consumer_*.charm' -print -quit)

          echo "MICROOVN_CHARM_PATH=$MICROOVN_CHARM_PATH" >> $GITHUB_ENV
          echo "INTERFACE_CONSUMER_CHARM_PATH=$INTERFACE_CONSUMER_CHARM_PATH" >> $GITHUB_ENV

          echo "MicroOVN charm: $MICROOVN_CHARM_PATH"
          echo "Interface consumer charm: $INTERFACE_CONSUMER_CHARM_PATH"

      - name: Install dependencies
        run: |
          sudo snap install concierge --classic
          sudo apt-get update
          sudo apt-get install -y tox

      - name: Prepare Environment
        run: |
          cat <<EOF > /tmp/concierge.yaml
          juju:
            channel: 3.6/stable

          providers:
            microk8s:
              enable: true
              bootstrap: true
              addons:
                - dns
                - hostpath-storage
                - metallb

            lxd:
              enable: true
              bootstrap: true
          EOF

          sudo concierge prepare -c /tmp/concierge.yaml

      - name: Run tests
        run: make check-integration TESTSUITEFLAGS="${{ matrix.test }}"

  tics:
    name: TICS Code Quality
    needs: unit-tests
    runs-on: [self-hosted, linux, amd64, tiobe, noble]
    # TICS execution requires access to an auth. token which is not available in the forks of this
    # repository. We allow this job to run only if it has access to the token:
    #  * On "push" action
    #  * On scheduled action
    #  * On pull request created from the main repository (not fork)
    if: ${{ (github.event_name != 'pull_request') || (github.repository == github.event.pull_request.head.repo.full_name) }}
    env:
      COVERAGE_DIR: ${{ github.workspace }}/.coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv
          python3 -m venv .venv
          source .venv/bin/activate
          pip install poetry==2.2.1
          poetry install --extras dev --no-root
          pip install flake8 pylint

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: unit-test-coverage
          path: ${{ env.COVERAGE_DIR }}

      # This type of the TICS run creates a persistent measurement point against
      # which we measure subsequent changes. Therefore, it is created only on push to
      # the main branch or during the weekly scheduled runs.
      - name: "Full TICS run (mode: qserver)"
        if: ${{ (github.event_name == 'push') || (github.event_name == 'schedule') }}
        uses: tiobe/tics-github-action@v3
        env:
          TICSAUTHTOKEN: ${{ secrets.TICSAUTHTOKEN }}
        with:
          mode: qserver
          project: microovn-operator
          branchdir: .
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: true

      # This type of the TICS run compares current state of the code against the last
      # persistent measurement point. We run in on proposed pull requests.
      - name: "Comparative TICS run (mode: client)"
        if: ${{ github.event_name == 'pull_request' }}
        uses: tiobe/tics-github-action@v3
        env:
          TICSAUTHTOKEN: ${{ secrets.TICSAUTHTOKEN }}
        with:
          mode: client
          project: microovn-operator
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: true
